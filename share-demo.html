<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邀请你加入AI交流群</title>
    
    <!-- ============================================ -->
    <!-- Open Graph 标签 - 微信分享卡片关键配置 -->
    <!-- ============================================ -->
    <meta property="og:title" content="邀请你加入AI交流群">
    <meta property="og:description" content="最新AI工具分享、ChatGPT使用技巧、Midjourney绘画交流，快来一起探索AI世界！">
    <meta property="og:image" content="https://123.com/logo.png">
    <meta property="og:url" content="https://123.com/">
    <meta property="og:type" content="website">
    
    <!-- 微博/QQ 兼容 -->
    <meta itemprop="name" content="邀请你加入AI交流群">
    <meta itemprop="description" content="最新AI工具分享、ChatGPT使用技巧、Midjourney绘画交流，快来一起探索AI世界！">
    <meta itemprop="image" content="https://123.com/logo.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="邀请你加入AI交流群">
    <meta name="twitter:description" content="最新AI工具分享、ChatGPT使用技巧、Midjourney绘画交流，快来一起探索AI世界！">
    <meta name="twitter:image" content="https://123.com/logo.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            margin-bottom: 20px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            margin-left: auto;
            margin-right: auto;
        }
        h1 { font-size: 22px; color: #333; margin-bottom: 12px; }
        p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 25px; }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
        .tips {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
        }
        .tips h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .tips ul {
            font-size: 13px;
            color: #666;
            padding-left: 18px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">AI</div>
        <h1>邀请你加入AI交流群</h1>
        <p>最新AI工具分享、ChatGPT使用技巧、Midjourney绘画交流，快来一起探索AI世界！</p>
        <a class="btn" href="https://123.com/">立即查看</a>
        <div class="footer">分享自 123.com</div>
        
        <div class="tips">
            <h3>这是一个示例页面，你需要修改：</h3>
            <ul>
                <li>将 og:image 中的图片地址替换为你自己的LOGO</li>
                <li>修改 title、description 为你自己的内容</li>
                <li>将 og:url 替换为你的实际链接</li>
                <li>确保图片可公网访问，且尺寸建议300×300px</li>
            </ul>
        </div>
    </div>
</body>
</html>
