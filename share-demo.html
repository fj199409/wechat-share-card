<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推荐科技AI助手</title>

    <!-- ============================================ -->
    <!-- Open Graph 标签 - 微信分享卡片关键配置 -->
    <!-- 微信靠这些标签生成分享卡片，必须保留！ -->
    <!-- ============================================ -->
    <meta property="og:title" content="推荐科技AI助手">
    <meta property="og:description" content="推荐科技AI助手">
    <meta property="og:image" content="https://ai.bb.bj.cn/static/logo.png">
    <meta property="og:url" content="https://ai.bb.bj.cn/">
    <meta property="og:type" content="website">

    <!-- 微博/QQ 兼容 -->
    <meta itemprop="name" content="推荐科技AI助手">
    <meta itemprop="description" content="推荐科技AI助手">
    <meta itemprop="image" content="https://ai.bb.bj.cn/static/logo.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="推荐科技AI助手">
    <meta name="twitter:description" content="推荐科技AI助手">
    <meta name="twitter:image" content="https://ai.bb.bj.cn/static/logo.png">

    <!-- ===== 核心：自动跳转配置 ===== -->
    <!-- 0秒后直接跳转到目标页面，用户无感知 -->
    <meta http-equiv="refresh" content="0;url=https://ai.bb.bj.cn/">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .loading {
            text-align: center;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading p {
            color: #999;
            font-size: 14px;
        }
        .manual-link {
            display: none;
            margin-top: 15px;
        }
        .manual-link a {
            color: #667eea;
            font-size: 14px;
            text-decoration: none;
        }
        /* 如果1秒后还没跳转，显示手动跳转链接（兼容JS禁用情况） */
        body:not(.jumped) .manual-link {
            display: block;
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="loading-spinner"></div>
        <p>正在跳转...</p>
        <div class="manual-link">
            <a href="https://ai.bb.bj.cn/">点击手动跳转</a>
        </div>
    </div>

    <!-- JS 双重保险：页面加载后立即跳转 -->
    <script>
        // 立即跳转（比 meta refresh 更快）
        window.location.replace('https://ai.bb.bj.cn/');
        // 标记已跳转（隐藏手动链接）
        document.body.classList.add('jumped');
    </script>
</body>
</html>
